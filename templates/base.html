<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #f5f6fa; }
        .navbar { box-shadow: 0 2px 8px rgba(0,0,0,.1); background:#111827 !important; }
        .navbar-brand { font-weight: 600; letter-spacing:.3px; }
        .nav-link-clean {
            color: rgba(255,255,255,.72);
            font-size: .88rem;
            text-decoration: none;
            padding: .4rem .65rem;
            border-radius: 6px;
            transition: color .15s ease, background-color .15s ease;
        }
        .nav-link-clean:hover { color:#fff; background: rgba(255,255,255,.08); }
        .navbar .vr-soft { width:1px; height:20px; background: rgba(255,255,255,.15); }
        .user-menu-btn {
            display:flex; align-items:center; gap:.5rem;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            color:#fff; font-size:.85rem;
            padding:.3rem .7rem .3rem .4rem;
            border-radius: 999px;
        }
        .user-menu-btn:hover { background: rgba(255,255,255,.12); }
        .user-avatar {
            width:26px; height:26px; border-radius:50%;
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            display:flex; align-items:center; justify-content:center;
            font-size:.75rem; font-weight:600; color:#fff;
        }
        .dropdown-menu-clean { border-radius:10px; border:none; box-shadow:0 8px 24px rgba(0,0,0,.15); padding:.4rem; min-width:190px; }
        .dropdown-menu-clean .dropdown-item { border-radius:6px; font-size:.88rem; padding:.5rem .7rem; }
        .dropdown-menu-clean .dropdown-item i { width:18px; }
        .card { border-radius: 12px !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('places.home') }}">
        <i class="bi bi-globe-asia-australia me-2"></i>Travel
    </a>
    <div class="d-flex align-items-center gap-1 flex-wrap">
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('places.home') }}" class="nav-link-clean"><i class="bi bi-house me-1"></i>หน้าแรก</a>
        <a href="{{ url_for('places.list_places') }}" class="nav-link-clean"><i class="bi bi-map me-1"></i>สถานที่</a>
        <a href="{{ url_for('places.map_view') }}" class="nav-link-clean"><i class="bi bi-pin-map me-1"></i>แผนที่</a>
        <a href="{{ url_for('places.my_favorites') }}" class="nav-link-clean"><i class="bi bi-heart me-1"></i>โปรด</a>

        <div class="vr-soft mx-2"></div>

        <div class="dropdown">
          <button class="user-menu-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="user-avatar">{{ current_user.username[0]|upper }}</span>
            <span>{{ current_user.username }}</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-clean">
            <li><a class="dropdown-item" href="{{ url_for('user.profile') }}"><i class="bi bi-person-circle me-1"></i>โปรไฟล์ของฉัน</a></li>
            {% if current_user.is_admin %}
            <li><a class="dropdown-item" href="{{ url_for('admin.dashboard') }}"><i class="bi bi-gear-fill me-1"></i>Admin</a></li>
            {% endif %}
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}"><i class="bi bi-box-arrow-right me-1"></i>ออกจากระบบ</a></li>
          </ul>
        </div>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="nav-link-clean"><i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-light btn-sm rounded-pill px-3"><i class="bi bi-person-plus me-1"></i>สมัคร</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid px-4 mt-4">
    {% block content %}{% endblock %}
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
