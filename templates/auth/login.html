{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
<div class="col-md-5 col-lg-4">
<div class="card shadow-lg border-0 rounded-4 p-4">

    <h4 class="text-center fw-bold mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ</h4>

    {% if error %}
    <div class="alert alert-danger py-2 text-center small"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="identifier" class="form-control form-control-lg rounded-end"
                       placeholder="เบอร์โทร/อีเมล/ชื่อผู้ใช้" required autofocus>
            </div>
        </div>
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control form-control-lg rounded-end"
                       placeholder="รหัสผ่าน" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3 fw-bold"><i class="bi bi-arrow-right-circle me-1"></i>ถัดไป</button>
    </form>

    <div class="text-center mt-2">
        <a href="{{ url_for('auth.register') }}" class="text-decoration-none text-muted small"><i class="bi bi-person-plus me-1"></i>สมัครสมาชิก</a>
    </div>

    <div class="d-flex align-items-center my-3 gap-2">
        <hr class="flex-grow-1 m-0">
        <span class="text-muted small px-1">หรือ</span>
        <hr class="flex-grow-1 m-0">
    </div>

    <a href="{{ url_for('auth.facebook_login') }}" class="btn btn-outline-secondary w-100 mb-2 rounded-3 d-flex align-items-center gap-2 justify-content-start px-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        <span>เข้าสู่ระบบด้วย Facebook</span>
    </a>


    <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline-secondary w-100 rounded-3 d-flex align-items-center gap-2 justify-content-start px-3">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span>เข้าสู่ระบบด้วย Google</span>
    </a>

</div>
</div>
</div>

{% endblock %}
