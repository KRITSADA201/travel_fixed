{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-5">
<div class="card shadow p-4">
    <h4 class="mb-4 text-center"><i class="bi bi-person-plus me-2"></i>สมัครสมาชิก</h4>

    {% if error %}
    <div class="alert alert-danger py-2 text-center small"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person me-1"></i>ชื่อผู้ใช้ <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" placeholder="กรอกชื่อผู้ใช้" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-lock me-1"></i>รหัสผ่าน <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-envelope me-1"></i>อีเมล <span class="text-muted">(ไม่บังคับ)</span></label>
            <input type="email" name="email" class="form-control" placeholder="example@email.com">
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-telephone me-1"></i>เบอร์โทร <span class="text-muted">(ไม่บังคับ)</span></label>
            <input type="tel" name="phone" class="form-control" placeholder="0812345678">
        </div>
        <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-circle me-1"></i>สมัครสมาชิก</button>
    </form>

    <hr>
    <p class="text-center mb-0 text-muted">มีบัญชีแล้ว? <a href="{{ url_for('auth.login') }}"><i class="bi bi-box-arrow-in-right me-1"></i>เข้าสู่ระบบ</a></p>
</div>
</div>
</div>

{% endblock %}
